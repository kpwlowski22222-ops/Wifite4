[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: pty-based full-TUI boot (run with KFIOSA_SMOKE=1)
    root: requires root privileges (run with sudo, e.g. `sudo -E .venv/bin/pytest -m root`)
addopts = -ra -q
filterwarnings =
    ignore::DeprecationWarning